<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Lanjutan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="event-demo p-4 my-4 border border-gray-300 rounded w-full max-w-md">
        <h1 class="font-semibold mb-2">Kalkulator Lanjutan</h1>
        <div class="flex gap-2 mb-3">
            <input type="number" id="angka1" placeholder="Angka 1" class="border p-2 rounded flex-1">
            <input type="number" id="angka2" placeholder="Angka 2" class="border p-2 rounded flex-1">
        </div>
        <div class="grid grid-cols-3 gap-2">
            <button id="btn-tambah" class="bg-green-500 text-white px-3 py-2 rounded hover:bg-green-600">+</button>
            <button id="btn-kurang" class="bg-yellow-500 text-white px-3 py-2 rounded hover:bg-yellow-600">-</button>
            <button id="btn-kali" class="bg-purple-500 text-white px-3 py-2 rounded hover:bg-purple-600">×</button>
            <button id="btn-bagi" class="bg-red-500 text-white px-3 py-2 rounded hover:bg-red-600">÷</button>
            <button id="btn-pangkat" class="bg-blue-500 text-white px-3 py-2 rounded hover:bg-blue-600">^</button>
            <button id="btn-modulus" class="bg-indigo-500 text-white px-3 py-2 rounded hover:bg-indigo-600">%</button>
        </div>
        <div class="mt-3">
            <button id="btn-akar" class="bg-teal-500 text-white px-3 py-2 rounded hover:bg-teal-600 w-full">√ (Akar Kuadrat)</button>
        </div>
        <div id="hasil-kalkulator" class="mt-3 font-semibold"></div>
    </div>

    <script>
        // Event Handler untuk Kalkulator
        document.getElementById("btn-tambah").addEventListener("click", function () {
            calculate("tambah");
        });
        document.getElementById("btn-kurang").addEventListener("click", function () {
            calculate("kurang");
        });
        document.getElementById("btn-kali").addEventListener("click", function () {
            calculate("kali");
        });
        document.getElementById("btn-bagi").addEventListener("click", function () {
            calculate("bagi");
        });
        document.getElementById("btn-pangkat").addEventListener("click", function () {
            calculate("pangkat");
        });
        document.getElementById("btn-modulus").addEventListener("click", function () {
            calculate("modulus");
        });
        document.getElementById("btn-akar").addEventListener("click", function () {
            calculate("akar");
        });

        function calculate(operation) {
            const angka1 = parseFloat(document.getElementById("angka1").value);
            const angka2 = parseFloat(document.getElementById("angka2").value);
            let hasil;

            if (operation !== "akar" && (isNaN(angka1) || isNaN(angka2))) {
                document.getElementById("hasil-kalkulator").textContent = "Masukkan angka yang valid!";
                return;
            }

            switch (operation) {
                case "tambah":
                    hasil = angka1 + angka2;
                    break;
                case "kurang":
                    hasil = angka1 - angka2;
                    break;
                case "kali":
                    hasil = angka1 * angka2;
                    break;
                case "bagi":
                    hasil = angka2 !== 0 ? angka1 / angka2 : "Error: Pembagian oleh nol";
                    break;
                case "pangkat":
                    hasil = Math.pow(angka1, angka2);
                    break;
                case "modulus":
                    hasil = angka1 % angka2;
                    break;
                case "akar":
                    const angka = parseFloat(document.getElementById("angka1").value);
                    if (isNaN(angka)) {
                        document.getElementById("hasil-kalkulator").textContent = "Masukkan angka yang valid!";
                        return;
                    }
                    hasil = Math.sqrt(angka);
                    break;
                default:
                    hasil = "Operasi tidak valid";
            }

            document.getElementById("hasil-kalkulator").textContent = `Hasil: ${hasil}`;
        }
    </script>
</body>
</html>
